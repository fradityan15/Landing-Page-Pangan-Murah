<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Pangan Murah</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        /* Styling Khusus Halaman Login */
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
        }
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        .login-box {
            background: var(--surface);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .back-home {
            display: block;
            margin-bottom: 20px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-home:hover { color: var(--primary); }
        
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-muted); }
        .input-group input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            outline: none;
        }
        .input-group input:focus { border-color: var(--primary); }
        
        .btn-full { width: 100%; text-align: center; border: none; font-family: inherit; cursor: pointer; }
        
        .google-btn {
            background: white;
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }
        
        .divider {
            margin: 25px 0;
            display: flex;
            align-items: center;
            color: var(--text-muted);
            font-size: 0.8rem;
        }
        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #334155;
            margin: 0 10px;
        }
    </style>
</head>
<body>

    <div class="login-container text-center">
        <a href="index.html" class="back-home">← Kembali ke Beranda</a>
        
        <div class="login-box shadow">
            <div class="logo mb-2">Pangan<span>Murah</span></div>
            <p style="color: var(--text-muted); margin-bottom: 30px;">Masuk untuk mulai berburu makanan</p>

            <form action="#">
                <div class="input-group">
                    <label>Email atau Username</label>
                    <input type="text" placeholder="Masukkan email kamu" required>
                </div>
                
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-primary btn-full shadow">Masuk Sekarang</button>
                
                <div class="divider">atau</div>

                <button type="button" class="btn-primary google-btn btn-full">
                    <span class="material-symbols-outlined" style="margin-right: 10px; font-size: 20px;">account_circle</span>
                    Masuk dengan Google
                </button>
            </form>

            <p style="margin-top: 30px; font-size: 0.85rem; color: var(--text-muted);">
                Belum punya akun? <a href="register.html" style="color: var(--primary); text-decoration: none;">Daftar Gratis</a>
            </p>
        </div>
    </div>

</body>
</html>
