<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Pangan Murah</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <style>
        /* --- Design System (Variabel Warna) --- */
        :root {
            --primary: #22C55E;   /* Rescue Green */
            --secondary: #F97316; /* Fresh Orange */
            --dark: #0F172A;      /* Dark Slate */
            --surface: #1E293B;   /* Card Background */
            --text-light: #F8FAFC;
            --text-muted: #94A3B8;
        }

        /* --- Global Reset --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text-light);
            padding: 20px;
        }

        /* --- Container --- */
        .login-container {
            width: 100%;
            max-width: 420px;
        }

        .login-box {
            background: var(--surface);
            padding: 40px;
            border-radius: 28px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            text-align: center;
        }

        /* --- Logo & Text --- */
        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }
        .logo span { color: var(--primary); }

        .back-home {
            display: inline-block;
            margin-bottom: 24px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .back-home:hover { color: var(--primary); transform: translateX(-5px); }

        /* --- Form Elements --- */
        .input-group { 
            margin-bottom: 20px; 
            text-align: left; 
        }
        .input-group label { 
            display: block; 
            margin-bottom: 8px; 
            font-size: 0.85rem; 
            color: var(--text-muted); 
            font-weight: 600;
        }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            outline: none;
            font-size: 1rem;
            transition: 0.3s;
        }
        .input-group input:focus { 
            border-color: var(--primary); 
            box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.1);
        }

        /* --- Buttons --- */
        .btn-full { 
            width: 100%; 
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }
        .btn-primary:hover {
            background: #16a34a;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(34, 197, 94, 0.2);
        }

        .google-btn {
            background: white;
            color: #0F172A;
            margin-top: 10px;
        }
        .google-btn:hover {
            background: #f1f5f9;
            transform: translateY(-2px);
        }

        /* --- Divider --- */
        .divider {
            margin: 25px 0;
            display: flex;
            align-items: center;
            color: var(--text-muted);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #334155;
            margin: 0 15px;
        }

        /* --- Link Bawah --- */
        .register-link {
            margin-top: 30px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .register-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
        }
        .register-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <a href="index.html" class="back-home">← Kembali ke Beranda</a>
        
        <div class="login-box">
            <div class="logo">Pangan<span>Murah</span></div>
            <p style="color: var(--text-muted); margin-bottom: 30px; font-size: 0.95rem;">
                Masuk untuk mulai berburu makanan
            </p>

            <form action="#">
                <div class="input-group">
                    <label>Email atau Username</label>
                    <input type="text" placeholder="Masukkan email kamu" required>
                </div>
                
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-full btn-primary">
                    Masuk Sekarang
                </button>
                
                <div class="divider">atau</div>

                <button type="button" class="btn-full google-btn">
                    <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="20" alt="Google">
                    Masuk dengan Google
                </button>
            </form>

            <p class="register-link">
                Belum punya akun? <a href="register.html">Daftar Gratis</a>
            </p>
        </div>
    </div>

</body>
</html>
