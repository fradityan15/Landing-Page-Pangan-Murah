<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Kemitraan Restoran | Pangan Murah</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body style="background: var(--dark);">
    <div class="container" style="padding: 80px 20px; text-align: center;">
        <a href="../index.html" style="color: var(--text-muted); text-decoration: none;">← Kembali</a>
        <h1 style="margin: 20px 0;">Jadilah Mitra Toko Kami</h1>
        <p style="max-width: 600px; margin: 0 auto 40px;">Ubah potensi kerugian makanan sisa menjadi profit dan bantu kurangi food waste di Indonesia.</p>
        
        <div class="cta-form shadow" style="max-width: 500px; margin: 0 auto; text-align: left;">
            <form>
                <div style="margin-bottom: 15px;">
                    <label>Nama Bisnis/Toko</label>
                    <input type="text" placeholder="Contoh: Bakery Cipatat Indah" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white;">
                </div>
                <div style="margin-bottom: 15px;">
                    <label>Jenis Makanan</label>
                    <select style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white;">
                        <option>Bakery & Kue</option>
                        <option>Restoran/Catering</option>
                        <option>Supermarket</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%;">Daftar Sebagai Mitra</button>
            </form>
        </div>
    </div>
</body>
</html>
