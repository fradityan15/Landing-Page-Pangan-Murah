<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun | Pangan Murah</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: radial-gradient(circle at bottom left, #1e293b, #0f172a);
        }
        .register-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }
        .register-box {
            background: var(--surface);
            padding: 35px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .back-link {
            display: block;
            margin-bottom: 20px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link:hover { color: var(--primary); }
        
        .input-row {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .input-group { margin-bottom: 20px; text-align: left; flex: 1; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: var(--text-muted); }
        .input-group input {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            outline: none;
        }
        .input-group input:focus { border-color: var(--primary); }
        
        .btn-full { width: 100%; text-align: center; border: none; font-family: inherit; cursor: pointer; }
        
        .terms-text {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 20px;
        }
        .terms-text a { color: var(--primary); text-decoration: none; }
    </style>
</head>
<body>

    <div class="register-container text-center">
        <a href="index.html" class="back-link">← Kembali ke Beranda</a>
        
        <div class="register-box shadow">
            <div class="logo mb-2">Pangan<span>Murah</span></div>
            <p style="color: var(--text-muted); margin-bottom: 25px;">Gabung jadi Food Rescue Hero hari ini!</p>

            <form action="#">
                <div class="input-group">
                    <label>Nama Lengkap</label>
                    <input type="text" placeholder="Contoh: Indah Permata" required>
                </div>

                <div class="input-group">
                    <label>Alamat Email</label>
                    <input type="email" placeholder="nama@email.com" required>
                </div>
                
                <div class="input-row">
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" placeholder="••••••••" required>
                    </div>
                    <div class="input-group">
                        <label>Konfirmasi</label>
                        <input type="password" placeholder="••••••••" required>
                    </div>
                </div>

                <p class="terms-text">
                    Dengan mendaftar, kamu menyetujui <a href="#">Syarat & Ketentuan</a> serta <a href="#">Kebijakan Privasi</a> kami.
                </p>

                <button type="submit" class="btn-primary btn-full shadow">Buat Akun Sekarang</button>
            </form>

            <p style="margin-top: 25px; font-size: 0.85rem; color: var(--text-muted);">
                Sudah punya akun? <a href="login.html" style="color: var(--primary); text-decoration: none; font-weight: 600;">Masuk di sini</a>
            </p>
        </div>
    </div>

</body>
</html>
