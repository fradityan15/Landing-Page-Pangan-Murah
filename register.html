<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun | Pangan Murah</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- Design System (Variabel Warna) --- */
        :root {
            --primary: #22C55E;   /* Rescue Green */
            --secondary: #F97316; /* Fresh Orange */
            --dark: #0F172A;      /* Dark Slate */
            --surface: #1E293B;   /* Card Background */
            --text-light: #F8FAFC;
            --text-muted: #94A3B8;
        }

        /* --- Global Reset --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(circle at bottom left, #1e293b, #0f172a);
            color: var(--text-light);
            padding: 20px;
        }

        /* --- Container --- */
        .register-container {
            width: 100%;
            max-width: 480px; /* Sedikit lebih lebar untuk input row */
        }

        .register-box {
            background: var(--surface);
            padding: 40px;
            border-radius: 28px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            text-align: center;
        }

        /* --- Logo & Back Link --- */
        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }
        .logo span { color: var(--primary); }

        .back-link {
            display: inline-block;
            margin-bottom: 24px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .back-link:hover { color: var(--primary); transform: translateX(-5px); }

        /* --- Form Elements --- */
        .input-row {
            display: flex;
            gap: 15px;
            margin-bottom: 5px; /* Menyesuaikan jarak karena margin-bottom ada di input-group */
        }

        .input-group { 
            margin-bottom: 20px; 
            text-align: left; 
            flex: 1;
        }

        .input-group label { 
            display: block; 
            margin-bottom: 8px; 
            font-size: 0.85rem; 
            color: var(--text-muted); 
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            outline: none;
            font-size: 1rem;
            transition: 0.3s;
        }

        .input-group input:focus { 
            border-color: var(--primary); 
            box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.1);
        }

        /* --- Terms & Buttons --- */
        .terms-text {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 25px;
            line-height: 1.5;
        }
        .terms-text a { color: var(--primary); text-decoration: none; font-weight: 600; }

        .btn-full { 
            width: 100%; 
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            border: none;
            background: var(--primary);
            color: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .btn-full:hover {
            background: #16a34a;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(34, 197, 94, 0.2);
        }

        /* --- Footer Link --- */
        .login-link {
            margin-top: 30px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .login-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
        }
        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="register-container">
        <a href="index.html" class="back-link">← Kembali ke Beranda</a>
        
        <div class="register-box">
            <div class="logo">Pangan<span>Murah</span></div>
            <p style="color: var(--text-muted); margin-bottom: 30px; font-size: 0.95rem;">
                Gabung jadi Food Rescue Hero hari ini!
            </p>

            <form action="#">
                <div class="input-group">
                    <label>Nama Lengkap</label>
                    <input type="text" placeholder="Contoh: Indah Permata" required>
                </div>

                <div class="input-group">
                    <label>Alamat Email</label>
                    <input type="email" placeholder="nama@email.com" required>
                </div>
                
                <div class="input-row">
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" placeholder="••••••••" required>
                    </div>
                    <div class="input-group">
                        <label>Konfirmasi</label>
                        <input type="password" placeholder="••••••••" required>
                    </div>
                </div>

                <p class="terms-text">
                    Dengan mendaftar, kamu menyetujui <a href="#">Syarat & Ketentuan</a> serta <a href="#">Kebijakan Privasi</a> kami.
                </p>

                <button type="submit" class="btn-full">
                    Buat Akun Sekarang
                </button>
            </form>

            <p class="login-link">
                Sudah punya akun? <a href="login.html">Masuk di sini</a>
            </p>
        </div>
    </div>

</body>
</html>
